kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: dev

# 1 control-plane + 2 workers.
# Port mappings on the control-plane expose 80/443 on the host
# so ingress-nginx can be reached via localhost.
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP

  - role: worker
  - role: worker
